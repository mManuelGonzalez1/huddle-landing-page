<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <!-- icon and typography seccion start -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
  <!-- icon and typography seccion end -->
  <link rel="stylesheet" href="/styles.css">
  <title>Fronted Mentor | Huddle landing page with single introductory section</title>  
</head>

<body>
  <section class="container"><!--Container brand logo -->
     <figure class="container-logo">
        <img  class="logo"src="./images/logo.svg" alt="Huddle logo">
      </figure>

      <figure class="container-mockup">
        <img class="mockup" src="./images/illustration-mockups.svg" alt="illustration-mockups">
    </figure>

  </section>

  <section class="information"><!--company information container (title, paragraph,button)-->
    <h1 class="information__title">Build The Community Your Fans Will Love</h1>
    <p class="information__paragrap">Huddle re-imagines the way we build communities. You have a voice, but so does your audience. Create connections with your users as you engage in genuine discussion. </p>
    <a href="#" target="_blank" class="information__button"> Register</a>
  </section>

  <footer><!--company social media logo (facebook,twitter, instagram)-->
      <figure class="social-icons">
        <img src="./images/facebook-f-brands-solid.png" alt="Facebook-icon">
        <img src="./images/twitter-brands-solid.png" alt="Twitter-icon">
        <img src="./images/instagram-brands-solid.png" alt="Instagram-icon">
      </figure>
     
  </footer>
  
</body>
</html>
